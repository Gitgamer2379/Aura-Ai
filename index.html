<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI ✨ - Multilingual Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="aura-container">
        <header>
            <div class="logo">✨ Aura AI</div>
            <p>Sua assistente inteligente e poliglota</p>
        </header>

        <div id="chat-box" class="chat-box">
            <div class="message ai">Olá! Eu sou a <b>Aura</b>. Como posso ajudar você hoje? (I can speak many languages!)</div>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Pergunte algo para a Aura..." autocomplete="off">
            <button id="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <div class="footer-info">
            <small>Alimentado por Gemini API | Desenvolvido por Você</small>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
